name: Hypercode Native CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./submodules/hyperharness

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24.x' # Targeting modern Go versions for Fiber/SQLite

    - name: Ensure Dependencies
      run: go mod tidy

    - name: Build Global Core
      run: go build -v ./...

    - name: Run Core Parity Test Suite
      run: go test -v -race ./...
