name: "Validate Evidence Lock & Version Pins"
# Purpose: CI gate to ensure evidence lock integrity and version pins are current
# Runs on: every PR to docs/, every commit to main (post-merge validation), weekly schedule (drift detection)

on:
  pull_request:
    paths:
      - "docs/BUILTIN_TOOLS_EVIDENCE_LOCK.md"
      - "docs/fixtures/VERSION_PINS.jsonc"
      - "docs/fixtures/TOOL_CONTRACTS.md"
      - "docs/fixtures/**/*.yaml"
      - ".github/workflows/validate-evidence-lock.yml"
  push:
    branches: [main]
    paths:
      - "docs/BUILTIN_TOOLS_EVIDENCE_LOCK.md"
      - "docs/fixtures/VERSION_PINS.jsonc"
  schedule:
    # Weekly version drift check (Monday 9 AM UTC)
    - cron: "0 9 * * 1"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-lock-structure:
    name: "📋 Validate Evidence Lock Structure"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Check MARKDOWN formatting"
        run: |
          FILE="docs/BUILTIN_TOOLS_EVIDENCE_LOCK.md"
          if ! grep -q "^# Built-In Tools Evidence Lock" "$FILE"; then
            echo "❌ Missing expected document header"
            exit 1
          fi
          if ! grep -q "## Lock Rubric" "$FILE"; then
            echo "❌ Missing Lock Rubric section"
            exit 1
          fi
          if ! grep -q "## First-Party Verification Queue" "$FILE"; then
            echo "❌ Missing Verification Queue table"
            exit 1
          fi
          echo "✅ Document structure valid"

      - name: "Validate all L2+ platforms have source URLs"
        run: |
          # Extract all L2/L3 platform sections
          # Verify each has `https://` links in first-party sources
          python3 - <<'EOF'
          import re
          import sys
          
          with open("docs/BUILTIN_TOOLS_EVIDENCE_LOCK.md", "r") as f:
              content = f.read()
          
          # Find L2/L3 sections (look for "🟡 Partially Locked (L2" or "✅ Locked (L3")
          sections = re.findall(
              r"## .+?(?:Partially Locked \(L2|Locked \(L3).+?(?=^## |\Z)",
              content,
              re.MULTILINE | re.DOTALL
          )
          
          for section in sections:
              # Check for at least one https:// link
              if "https://" not in section:
                  print(f"❌ Section missing first-party URL:\n{section[:100]}")
                  sys.exit(1)
              
              # Check for date pin
              if "2026-03" not in section and "2026-02" not in section:
                  print(f"⚠️  Section may be stale (no recent date):\n{section[:100]}")
          
          print("✅ All L2+ sections have first-party evidence URLs")
          EOF

      - name: "Validate queue table completeness"
        run: |
          FILE="docs/BUILTIN_TOOLS_EVIDENCE_LOCK.md"
          
          # Extract verification queue table
          if grep -A 20 "## First-Party Verification Queue" "$FILE" | grep -q "OpenCode"; then
            echo "✅ Verification queue includes expected platforms"
          else
            echo "❌ Verification queue missing expected entries"
            exit 1
          fi

  validate-version-pins:
    name: "🔐 Validate Version Pin Configuration"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Install JSON/JSONC parser"
        run: npm install -g commentjson

      - name: "Parse and validate VERSION_PINS.jsonc"
        run: |
          python3 - <<'EOF'
          import json
          import re
          import sys
          
          # Read JSONC file and remove comments
          with open("docs/fixtures/VERSION_PINS.jsonc", "r") as f:
              content = f.read()
          
          # Remove // comments
          content = re.sub(r'//.*?$', '', content, flags=re.MULTILINE)
          
          try:
              pins = json.loads(content)
          except json.JSONDecodeError as e:
              print(f"❌ VERSION_PINS.jsonc has invalid JSON: {e}")
              sys.exit(1)
          
          print("✅ VERSION_PINS.jsonc is valid JSON")
          
          # Validate structure
          required_keys = ["metadata", "platforms", "ciValidation"]
          for key in required_keys:
              if key not in pins:
                  print(f"❌ Missing required key: {key}")
                  sys.exit(1)
          
          print("✅ VERSION_PINS.jsonc structure is valid")
          
          # Validate L2+ platforms have versionPin config
          l2_platforms = ["copilot-cli", "codex-cli", "claude-code", "cursor", "gemini-cli", "kiro"]
          for platform in l2_platforms:
              if platform not in pins["platforms"]:
                  print(f"❌ Missing platform config: {platform}")
                  sys.exit(1)
              
              p = pins["platforms"][platform]
              if p.get("level") != "L2":
                  print(f"⚠️  {platform} level mismatch (expected L2, got {p.get('level')})")
              
              if "versionPin" not in p:
                  print(f"❌ {platform} missing versionPin")
                  sys.exit(1)
          
          print("✅ All L2+ platforms have versionPin configuration")
          EOF

  validate-fixtures:
    name: "🎯 Validate Golden Fixtures"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "Install JSON schema validator"
        run: npm install -g ajv-cli

      - name: "Check TOOL_CONTRACTS.md exists and has content"
        run: |
          if [ ! -f "docs/fixtures/TOOL_CONTRACTS.md" ]; then
            echo "❌ TOOL_CONTRACTS.md missing"
            exit 1
          fi
          
          if ! grep -q "Platform:" docs/fixtures/TOOL_CONTRACTS.md; then
            echo "❌ TOOL_CONTRACTS.md missing expected platform sections"
            exit 1
          fi
          
          echo "✅ TOOL_CONTRACTS.md is valid"

      - name: "Check GOLDEN_FIXTURE_RESPONSES.md exists"
        run: |
          if [ ! -f "docs/fixtures/GOLDEN_FIXTURE_RESPONSES.md" ]; then
            echo "❌ GOLDEN_FIXTURE_RESPONSES.md missing"
            exit 1
          fi
          
          if ! grep -q "Platform:" docs/fixtures/GOLDEN_FIXTURE_RESPONSES.md; then
            echo "❌ GOLDEN_FIXTURE_RESPONSES.md missing platform sections"
            exit 1
          fi
          
          echo "✅ GOLDEN_FIXTURE_RESPONSES.md is valid"

      - name: "Check FIXTURE_SCHEMA.jsonc exists"
        run: |
          if [ ! -f "docs/fixtures/FIXTURE_SCHEMA.jsonc" ]; then
            echo "❌ FIXTURE_SCHEMA.jsonc missing"
            exit 1
          fi
          
          echo "✅ FIXTURE_SCHEMA.jsonc is present"

      - name: "Validate YAML fixture files syntax"
        run: |
          if [ -d "docs/fixtures" ]; then
            for file in docs/fixtures/*.yaml docs/fixtures/*.yml; do
              if [ -f "$file" ]; then
                if ! python3 -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null; then
                  echo "⚠️  YAML file has syntax issues (may be OK for templates): $file"
                fi
              fi
            done
          fi
          echo "✅ YAML fixtures checked"

      - name: "Validate fixture completeness"
        run: |
          python3 - <<'EOF'
          import os
          
          with open("docs/fixtures/GOLDEN_FIXTURE_RESPONSES.md", "r") as f:
              content = f.read()
          
          required_platforms = [
              "GitHub Copilot CLI",
              "Codex CLI", 
              "Claude Code",
              "Cursor",
              "Gemini CLI",
              "Kiro"
          ]
          
          for platform in required_platforms:
              if platform not in content:
                  print(f"❌ Missing platform in fixtures: {platform}")
                  exit(1)
          
          print("✅ All L2 platforms have golden fixtures")
          EOF

      - name: "Run fixture validation harness"
        run: |
          node docs/fixtures/verify-fixtures.mjs

  version-drift-check:
    name: "⚠️  Check for Version Drift"
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.head_ref, 'version-check')
    steps:
      - uses: actions/checkout@v4

      - name: "Check Copilot CLI version"
        continue-on-error: true
        run: |
          # This would require copilot CLI to be installed
          # In a real scenario, fetch from GitHub API
          echo "📌 Copilot CLI version check skipped (CI environment check needed)"

      - name: "Report drift status"
        run: |
          echo "ℹ️  Version drift check scheduled weekly"
          echo "ℹ️  Manual update: docs/fixtures/VERSION_PINS.jsonc"

  cross-reference-check:
    name: "🔗 Cross-Reference Lock & Index Files"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: "Verify evidence lock references are consistent"
        run: |
          python3 - <<'EOF'
          import re
          
          # Read lock file
          with open("docs/BUILTIN_TOOLS_EVIDENCE_LOCK.md", "r") as f:
              lock_content = f.read()
          
          # Read version pins
          with open("docs/fixtures/VERSION_PINS.jsonc", "r") as f:
              pins_content = f.read()
          
          # Extract platform names from both
          lock_platforms = set(re.findall(r'^## (.+?) —', lock_content, re.MULTILINE))
          version_platforms = set(re.findall(r'"(\w+)":\s*\{', pins_content))
          
          print(f"✅ Lock platforms: {len(lock_platforms)}")
          print(f"✅ Version pin platforms: {len(version_platforms)}")
          
          # Check for mismatches
          lock_only = lock_platforms - version_platforms
          pins_only = version_platforms - lock_platforms
          
          if lock_only:
              print(f"⚠️  In lock but not pins: {lock_only}")
          if pins_only:
              print(f"⚠️  In pins but not lock: {pins_only}")
          
          print("✅ Cross-reference check complete")
          EOF

  comment-results:
    name: "💬 Comment Results on PR"
    runs-on: ubuntu-latest
    needs: [validate-lock-structure, validate-version-pins, validate-fixtures]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: "Post validation results"
        uses: actions/github-script@v7
        with:
          script: |
            const body = `
## ✅ Evidence Lock Validation Results

- **Lock Structure**: ✓ Valid
- **Version Pins**: ✓ Configured
- **Golden Fixtures**: ✓ Present
- **Cross-References**: ✓ Consistent

### Summary
All evidence lock and fixture files are valid and in sync. Ready for merge! 🎯

**Next Steps**: 
- Run L3 promotion fixture capture for next platform release
- Update VERSION_PINS with latest captured versions weekly
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
